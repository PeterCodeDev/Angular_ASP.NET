
<app-listado-generico [listado]="peliculas">
    <ng-container contenido>
<div *ngFor="let pelicula of peliculas; 
  let index = index" 
  class = "pelicula-contenedor">
    <div>
      Pelicula {{index}}: {{pelicula.titulo | lowercase}}
    <button style="margin-left: 1rem;"(click)="remove(index)">Remove</button>
    </div>
    <div>
      {{pelicula.titulo | uppercase}}
    </div>
    <div>
      {{pelicula.fechaLanzamiento | date:"dd-MMMM-yy" | uppercase}}
    </div>
    <div>
      {{pelicula.fechaLanzamiento | date:"dd-MM-yy"}}
    </div>
  </div>
  </ng-container>
</app-listado-generico>
