<h2>Listado de peliculas</h2>

<div *ngIf="!peliculas"> 
  <img src="https://media.tenor.com/On7kvXhzml4AAAAj/loading-gif.gif"/>
  <p>CARGANDO PELICULAS</p>
</div>

<div *ngIf="peliculas?.length === 0">
  <p>No hay peliculas para mostrar</p>
</div>

<ng-container *ngIf = "peliculas && peliculas.length > 0">
  <div *ngFor="let pelicula of peliculas; 
  let index = index" 
  class = "pelicula-contenedor">
    <div>
      Pelicula {{index}}: {{pelicula.titulo | lowercase}}
    <button style="margin-left: 1rem;"(click)="remove(index)">Remove</button>
    </div>
    <div>
      {{pelicula.titulo | uppercase}}
    </div>
    <div>
      {{pelicula.fechaLanzamiento | date:"dd-MMMM-yy" | uppercase}}
    </div>
    <div>
      {{pelicula.fechaLanzamiento | date:"dd-MM-yy"}}
    </div>
  </div>
</ng-container>
