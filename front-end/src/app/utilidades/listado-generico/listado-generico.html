<h2>Listado de peliculas</h2>

<div *ngIf="!listado">
    <span #cargando>
        <ng-content select="[cargando]"></ng-content>
    </span> 
    <span *ngIf="!cargando.innerHTML.trim()">
        <img src="https://media.tenor.com/On7kvXhzml4AAAAj/loading-gif.gif"/>
        <p>CARGANDO PELICULAS</p>
    </span>
</div>

<div *ngIf="listado && listado.length === 0">
    <span #vacio><ng-content select="[vacio]"></ng-content></span>
    <span *ngIf="!vacio.innerHTML.trim()">
        <p>No hay peliculas para mostrar</p>
    </span>
</div>

<ng-container *ngIf = "listado && listado.length > 0">
  <ng-content select="[contenido]"></ng-content>
</ng-container>
