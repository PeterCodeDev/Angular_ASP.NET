<mat-tab-group>
    <mat-tab label="Editar">
        <mat-form-field apperance="fill">
        <mat-label>{{placeHolderTextArea}}</mat-label>
        <textarea #texto (input)="inputTextArea(texto.value)" matInput></textarea>
        </mat-form-field>
    </mat-tab>
    <mat-tab label="Preview">
        <markdown [data]="contenidoMarkdown" ngPreserveWhitespaces></markdown>
    </mat-tab>
</mat-tab-group>
