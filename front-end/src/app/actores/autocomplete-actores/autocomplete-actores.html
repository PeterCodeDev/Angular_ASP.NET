<form>
    <mat-form-field>
        <input type="text"
        placeholder="Selecione los actores"
        matInput
        [formControl]="control"
        [matAutocomplete]="auto"
        />
    </mat-form-field>

    <mat-autocomplete #auto>
        <mat-option *ngFor="let opcion of actores" [value]="opcion">
            <img [src]="opcion.foto" />{{opcion.nombre}}
        </mat-option>
    </mat-autocomplete>
</form>
